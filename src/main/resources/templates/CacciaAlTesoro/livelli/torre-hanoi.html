<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Torre di Hanoi | Caccia al Tesoro</title>
    <link rel="stylesheet" th:href="@{/css/home.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/torre-hanoi.css}" />
</head>

<body>
    <div class="sunwash" aria-hidden="true"></div>

    <header th:replace="~{fragments/header :: header('Torre di Hanoi', true, null)}"></header>

    <main class="dashboard-main game-container">
        <section class="game-card">
            <div class="section-header">
                <p class="eyebrow">Sfida di Logica</p>
                <h3>Risolvi la Torre di Hanoi</h3>
                <p>Sposta tutti i dischi dalla prima alla terza torre. Ricorda: non puoi mai mettere un disco più grande
                    sopra uno più piccolo.</p>
            </div>

            <div class="hanoi-game">
                <div class="towers-container">
                    <div class="tower" id="tower-1" data-tower="1">
                        <div class="tower-rod"></div>
                    </div>
                    <div class="tower" id="tower-2" data-tower="2">
                        <div class="tower-rod"></div>
                    </div>
                    <div class="tower" id="tower-3" data-tower="3">
                        <div class="tower-rod"></div>
                    </div>
                </div>

                <div class="game-controls">
                    <div class="stats">
                        <span class="stat-pill">Mosse: <span id="move-count">0</span></span>
                    </div>
                    <button id="reset-btn" class="cta-logout">Riavvia Gioco</button>
                </div>
            </div>

            <div class="completion-area">
                <input type="hidden" id="livello-input" th:value="${livello}" />
                <div id="error-message" class="error-message"
                    style="display: none; margin-bottom: 1rem; color: #ff4d4d; font-weight: bold; text-align: center;">
                    ⚠️ Si è verificato un errore durante il salvataggio dei progressi. Riprova.
                </div>
                <button id="complete-btn" class="cta disabled" disabled>Completato</button>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:src="@{/js/torre-hanoi.js}"></script>
</body>

</html>
