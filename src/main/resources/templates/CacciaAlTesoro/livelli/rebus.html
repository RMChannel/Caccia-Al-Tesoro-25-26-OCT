<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rebus | Caccia al Tesoro</title>
    <link rel="stylesheet" th:href="@{/css/home.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/rebus.css}" />
</head>

<body>
    <div class="sunwash" aria-hidden="true"></div>

    <header th:replace="~{fragments/header :: header('Sfida: Il Rebus', true, null)}"></header>

    <main class="dashboard-main game-container">
        <section class="game-card">
            <div class="section-header">
                <p class="eyebrow">Enigma Visivo</p>
                <h3>Risolvi il Rebus</h3>
                <p>“Solo l’Italia ne ha due”  10,7</p>
            </div>

            <div class="rebus-container">
                <div class="rebus-image-wrapper">
                    <img th:src="@{/photo/rebus.jpeg}" alt="Rebus" class="rebus-image" />
                </div>

                <div class="rebus-input-section">
                    <div class="input-group">
                        <label for="solution-input">La tua soluzione</label>
                        <input type="text" id="solution-input" class="rebus-input" placeholder="Scrivi qui..." autocomplete="off" />
                    </div>
                    
                    <input type="hidden" id="livello-input" th:value="${livello}" />
                    
                    <div id="error-message" class="error-message"></div>
                    
                    <button id="verify-btn" class="btn-verify">Verifica</button>
                </div>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:src="@{/js/rebus.js}"></script>
</body>

</html>
