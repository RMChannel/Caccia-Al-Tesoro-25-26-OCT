<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sudoku | Caccia al Tesoro</title>
    <link rel="stylesheet" th:href="@{/css/home.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/sudoku.css}" />
</head>

<body>
    <div class="sunwash" aria-hidden="true"></div>

    <header th:replace="~{fragments/header :: header('Sudoku Challenge', true, null)}"></header>

    <main class="dashboard-main game-container">
        <section class="game-card">
            <div class="section-header">
                <p class="eyebrow">Logica e Numeri</p>
                <h3>Risolvi il Sudoku</h3>
                <p>Completa la griglia assicurandoti che ogni riga, colonna e quadrato 3x3 contenga i numeri da 1 a 9 senza ripetizioni.</p>
            </div>

            <div class="sudoku-container">
                <div id="sudoku-grid" class="sudoku-grid">
                    <!-- Grid generated by JS -->
                </div>

                <div class="feedback-area">
                    <div id="timer-display" class="timer-display" style="display: none;">
                        Prossimo tentativo tra: <span id="countdown">30</span>s
                    </div>

                    <div id="error-message" class="error-message" style="display: none;">
                        ⚠️ La soluzione non è corretta! Controlla i numeri e riprova.
                    </div>
                </div>
            </div>

            <div class="completion-area">
                <input type="hidden" id="livello-input" th:value="${livello}" />
                <button id="complete-btn" class="cta">
                    <span>Verifica Risposta</span>
                    <i class="icon">➔</i>
                </button>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:src="@{/js/sudoku.js}"></script>
</body>

</html>
