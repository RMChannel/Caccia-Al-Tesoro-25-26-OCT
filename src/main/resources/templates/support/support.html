<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCT - Supporto</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="icon" type="image/png" th:href="@{/photo/logo.png}">
    <style>
        .support-container {
            max-width: 600px;
            margin: 40px auto 60px;
            padding: 0 20px;
        }
        .support-card {
            background: var(--surface);
            padding: 32px;
            border-radius: 24px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }
        .support-title {
            font-family: "DM Serif Display", serif;
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: var(--ink);
            text-align: center;
        }
        .support-subtitle {
            color: var(--ink-soft);
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-label {
            font-weight: 600;
            color: var(--ink-soft);
            font-size: 0.9rem;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background-color: #ffffff;
            color: var(--ink);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        .error-message {
            color: #dc2626;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="sunwash" aria-hidden="true"></div>

<header th:replace="~{fragments/header :: header('Supporto', false, ${user})}"></header>

<main class="support-container">
    <div class="support-card">
        <h1 class="support-title">Contatta il Supporto</h1>
        <p class="support-subtitle">Hai un problema o un suggerimento? Siamo qui per aiutarti.</p>

        <form th:action="@{/support}" th:object="${supportForm}" method="post">
            <div class="form-group">
                <label class="form-label" for="email">La tua Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-input" placeholder="tua@email.it" required>
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="categoria">Categoria</label>
                <select id="categoria" th:field="*{categoria}" class="form-select" required>
                    <option value="" disabled selected>Seleziona una categoria</option>
                    <option value="Domande">Domande</option>
                    <option value="Suggerimenti">Suggerimenti</option>
                    <option value="Bug">Bug</option>
                    <option value="Altro">Altro</option>
                </select>
                <div th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}" class="error-message"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="messaggio">Messaggio</label>
                <textarea id="messaggio" th:field="*{messaggio}" class="form-textarea" placeholder="Descrivi qui il tuo problema o suggerimento..." required></textarea>
                <div th:if="${#fields.hasErrors('messaggio')}" th:errors="*{messaggio}" class="error-message"></div>
            </div>

            <button type="submit" class="cta full" style="margin-top: 16px;">
                Invia Messaggio
            </button>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
