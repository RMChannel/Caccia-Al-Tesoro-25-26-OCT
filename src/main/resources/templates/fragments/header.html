<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <header th:fragment="header(title, showBackLink, user)" class="site-header">
        <div class="brand">
            <span class="brand-mark" aria-hidden="true">OCT</span>
            <div class="brand-text">
                <p class="brand-eyebrow">Olimpiadi della Cultura e del Talento</p>
                <h1 class="brand-title" th:text="${title}">Titolo Pagina</h1>
            </div>
        </div>
        <nav class="site-nav" aria-label="Principale">
            <a th:href="@{/regolamento}">Regolamento</a>
            <a th:href="@{/classifica}">Classifica</a>
            <th:block th:if="${showBackLink}">
                <a th:href="@{/caccia}">Torna alla Dashboard</a>
            </th:block>
            <th:block th:if="${user != null}">
                <span class="nav-user">
                    👤 <span th:text="${user.realName}">Team Alpha</span>
                </span>
                <form method="post" th:action="@{/logout}" style="display:inline">
                    <button type="submit" class="cta-logout">Esci</button>
                </form>
            </th:block>
        </nav>
    </header>
</body>
</html>
