spring.application.name=Caccia_Al_TesoroV2
server.port=80
server.forward-headers-strategy=framework
server.servlet.context-path=/caccia-al-tesoro
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.name=JSESSIONID_CACCIAALTESOROV2
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
admin.mail=${EMAIL}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Protezione carico elevato
spring.thymeleaf.cache=true
spring.datasource.hikari.maximum-pool-size=50
server.tomcat.accept-count=200
server.tomcat.threads.max=400
server.tomcat.max-connections=2000

# Spring Boot Actuator & Prometheus Metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true